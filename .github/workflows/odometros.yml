name: Actualizar Odómetros (Nexpro + Scania)

on:
  schedule:
    - cron: '0 13 * * 1-6'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome y Xvfb
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright browsers
        run: playwright install chromium

      - name: Correr Nexpro (Iveco)
        env:
          NEXPRO_USUARIO:           ${{ secrets.NEXPRO_USUARIO }}
          NEXPRO_PASSWORD:          ${{ secrets.NEXPRO_PASSWORD }}
          SHEET_ID:                 ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python nexpro_odometros.py

      - name: Correr Scania (Playwright)
        env:
          SCANIA_USUARIO:           ${{ secrets.SCANIA_USUARIO }}
          SCANIA_PASSWORD:          ${{ secrets.SCANIA_PASSWORD }}
          SHEET_ID:                 ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python scania_odometros.py

      - name: Subir screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-scania
          path: "*.png"
