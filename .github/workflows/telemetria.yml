name: Carga datos Nexpro

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install selenium gspread google-auth

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Ejecutar script
        env:
          NEXPRO_USUARIO: ${{ secrets.NEXPRO_USUARIO }}
          NEXPRO_PASSWORD: ${{ secrets.NEXPRO_PASSWORD }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python carga_aut_datos_nexpro.py

        name: Actualizar Odómetros Nexpro

on:
  schedule:
    - cron: '0 13 * * 1-6'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Inicio
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Nexpro
        env:
          NEXPRO_USUARIO: ${{ secrets.NEXPRO_USUARIO }}
          NEXPRO_PASSWORD: ${{ secrets.NEXPRO_PASSWORD }}
          SHEET_ID_SERVICES: ${{ secrets.SHEET_ID_SERVICES }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python nexpro_odometros.py > salida.txt 2>&1

      - name: Fin OK
        if: success()
        run: |
          echo "END_TIME=$(date +%s)" >> $GITHUB_ENV
          echo "STATUS=OK" >> $GITHUB_ENV

      - name: Fin ERROR
        if: failure()
        run: |
          echo "END_TIME=$(date +%s)" >> $GITHUB_ENV
          echo "STATUS=ERROR" >> $GITHUB_ENV

      - name: Mail éxito
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Nexpro actualizado correctamente"
          to: ${{ secrets.EMAIL_FROM }}
          from: GitHub Nexpro
          body: |
            Estado: EXITOSO

            Hora Argentina:
            $(TZ=America/Argentina/Buenos_Aires date)

            Duración:
            $((END_TIME - START_TIME)) segundos

            Cantidad de unidades:
            Revisar salida.txt

            Workflow:
            ${{ github.workflow }}

            Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Mail error
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Error en Nexpro"
          to: ${{ secrets.EMAIL_FROM }}
          from: GitHub Nexpro
          body: |
            Estado: FALLÓ

            Hora Argentina:
            $(TZ=America/Argentina/Buenos_Aires date)

            Duración:
            $((END_TIME - START_TIME)) segundos

            Error real:
            Revisar logs del run.

            Workflow:
            ${{ github.workflow }}

            Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
