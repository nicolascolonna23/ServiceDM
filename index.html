<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-BcGUJLdB2MCZXH1VRCOXSZQwktrKeEYO4DrEswu1Dso8nr9291YZWcWB4Sp8POdJM4plo0VEfn8f/pub?output=csv";

fetch(URL)
  .then(response => response.text())
  .then(data => {
    // Dividimos por líneas y limpiamos espacios en blanco
    let filas = data.split(/\r?\n/).filter(linea => linea.trim() !== "");
    let tabla = document.getElementById("tabla");

    filas.slice(1).forEach(fila => {
      // Separamos por coma o punto y coma
      let col = fila.split(/[,;]/);

      if(col.length < 8) return; 

      // Limpiamos comillas y espacios de los datos
      col = col.map(c => c.replace(/"/g, "").trim());

      // Procesamos el valor de "Falta" (columna index 8)
      // Eliminamos el punto de miles y cambiamos coma decimal por punto
      let faltaRaw = col[8] || "0";
      let falta = parseFloat(faltaRaw.replace(/\./g, "").replace(",", "."));

      let clase = "";
      if (falta < 50000) {
        clase = "rojo";
      } else if (falta < 150000) {
        clase = "amarillo";
      } else {
        clase = "verde";
      }

      let row = `<tr class="${clase}">
        <td>${col[0] || ""}</td>
        <td>${col[1] || ""}</td>
        <td>${col[2] || ""}</td>
        <td>${col[4] || ""}</td>
        <td>${col[5] || ""}</td>
        <td>${col[6] || ""}</td>
        <td>${col[7] || ""}</td>
        <td>${col[8] || ""}</td>
      </tr>`;

      tabla.innerHTML += row;
    });
  })
  .catch(err => console.error("Error al cargar datos:", err));
</script>
