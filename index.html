<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Servicios | Diemar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0d0f;
      --card-bg: #161a1e;
      --primary-orange: #d35400;
      --text-light: #f4f4f4;
      --border-color: #2a2e33;
      --status-red: #ff4d4d;
      --status-yellow: #ffcc00;
      --status-green: #2ecc71;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-light);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      width: 100%;
      max-width: 1250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--primary-orange);
      padding-bottom: 15px;
    }
    .logo-main {
      max-height: 70px;
      margin-bottom: 10px;
    }
    .refresh-indicator {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* TÃ­tulos de secciÃ³n */
    .section-title {
      width: 100%;
      max-width: 1250px;
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 30px 0 8px;
      padding-bottom: 6px;
      border-left: 3px solid var(--primary-orange);
      padding-left: 12px;
    }
    .section-title:first-of-type {
      margin-top: 0;
    }

    .container {
      width: 100%;
      max-width: 1250px;
      background: var(--card-bg);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      margin-bottom: 10px;
    }
    /* LOGO DIFUMINADO DE FONDO */
    .container::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 60%;
      background-image: url('logo_diemar4.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }
    .table-wrapper {
      position: relative;
      z-index: 1;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }
    th {
      background-color: #000;
      color: #888;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1.5px;
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      transition: color 0.3s;
      position: sticky;
      top: 0;
    }
    th:hover { color: var(--primary-orange); }
    .filter-row th {
      background-color: #0a0a0a;
      padding: 8px;
      cursor: default;
    }
    .filter-input {
      width: 90%;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
      padding: 5px;
      font-size: 12px;
      border-radius: 4px;
      outline: none;
    }
    .filter-input:focus { border-color: var(--primary-orange); }
    td {
      padding: 15px 10px;
      border-bottom: 1px solid var(--border-color);
      font-size: 13.5px;
      text-align: center;
    }
    tr:hover { background-color: rgba(211, 84, 0, 0.05); }
    .status-pill {
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
      display: inline-block;
      min-width: 90px;
    }
    .rojo  { color: var(--status-red);    border: 1px solid var(--status-red);    background: rgba(255,77,77,0.1); }
    .amarillo { color: var(--status-yellow); border: 1px solid var(--status-yellow); background: rgba(255,204,0,0.1); }
    .verde { color: var(--status-green);  border: 1px solid var(--status-green);  background: rgba(46,204,113,0.1); }
    .km-val {
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="logo_diemar4.png" alt="Diemar" class="logo-main">
    <h1>Control de Servicios - Flota</h1>
    <div class="refresh-indicator" id="last-update">Sincronizando...</div>
  </div>

  <!-- ===================== MÃDULO 1: SERVICIOS ===================== -->
  <div class="section-title">Services - Flota</div>
  <div class="container">
    <div class="table-wrapper">
      <table id="miTabla">
        <thead>
          <tr>
            <th onclick="ordenarTabla(0)">Patente â</th>
            <th onclick="ordenarTabla(1)">Marca â</th>
            <th onclick="ordenarTabla(2)">Chofer â</th>
            <th onclick="ordenarTabla(3)">Ãltimo Service â</th>
            <th onclick="ordenarTabla(4)">KM Ãltimo â</th>
            <th onclick="ordenarTabla(5)">PrÃ³ximo â</th>
            <th onclick="ordenarTabla(6)">KM Actual â</th>
            <th onclick="ordenarTabla(7)">Falta â</th>
          </tr>
          <tr class="filter-row">
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(0)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(1)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(2)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(3)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(4)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(5)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(6)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(7)"></th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr><td colspan="8">Cargando flota...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== MÃDULO 2: PREFILTROS ===================== -->
  <div class="section-title">Cambio de Prefiltros</div>
  <div class="container">
    <div class="table-wrapper">
      <table id="tablaPrefiltro">
        <thead>
          <tr>
            <th onclick="ordenarTablaPrefiltro(0)">Patente â</th>
            <th onclick="ordenarTablaPrefiltro(1)">Ãlt. Cambio (KM) â</th>
            <th onclick="ordenarTablaPrefiltro(2)">Falta â</th>
          </tr>
          <tr class="filter-row">
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumnaPrefiltro(0)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumnaPrefiltro(1)"></th>
            <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumnaPrefiltro(2)"></th>
          </tr>
        </thead>
        <tbody id="tabla-body-prefiltro">
          <tr><td colspan="3">Cargando prefiltros...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // ===================== SERVICIOS =====================
    const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-BcGUJLdB2MCZXH1VRCOXSZQwktrKeEYO4DrEswu1Dso8nr9291YZWcWB4Sp8POdJM4plo0VEfn8f/pub?output=csv";

    async function cargarDatos() {
      try {
        const version = new Date().getTime();
        const response = await fetch(`${BASE_URL}&v=${version}`);
        const csvText = await response.text();
        if (csvText.includes("<html")) return;
        const filas = csvText.split(/\r?\n/).filter(f => f.trim() !== "" && f.includes(","));
        const tablaBody = document.getElementById("tabla-body");
        tablaBody.innerHTML = "";
        filas.slice(1).forEach(fila => {
          const col = fila.split(/[,;]/).map(c => c.replace(/"/g, "").trim());
          if (col.length < 9 || !col[0] || col[0].toLowerCase() === "patente") return;
          const faltaVal = col[8] || "0";
          const faltaNum = parseFloat(faltaVal.replace(/\./g, "").replace(",", "."));
          let clase = "verde";
          if (faltaNum < 5000) clase = "rojo";
          else if (faltaNum < 15000) clase = "amarillo";
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="font-weight:bold; color:var(--primary-orange)">${col[0]}</td>
            <td>${col[1]}</td>
            <td>${col[2]}</td>
            <td>${col[4]}</td>
            <td class="km-val">${col[5]}</td>
            <td>${col[6]}</td>
            <td class="km-val">${col[7]}</td>
            <td><span class="status-pill ${clase}">${col[8]}</span></td>
          `;
          tablaBody.appendChild(tr);
        });
        document.getElementById("last-update").innerText = `Ãltima actualizaciÃ³n: ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        console.error(e);
      }
    }

    function filtrarColumna(n) {
      let inputs = document.querySelectorAll('#miTabla .filter-input');
      let filter = inputs[n].value.toUpperCase();
      let table = document.getElementById("miTabla");
      let tr = table.getElementsByTagName("tr");
      for (let i = 2; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[n];
        if (td) {
          let txtValue = td.textContent || td.innerText;
          tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
      }
    }

    let ordenAsc = true;
    function ordenarTabla(n) {
      let table = document.getElementById("miTabla");
      let tbody = table.querySelector("tbody");
      let rows = Array.from(tbody.querySelectorAll("tr"));
      const limpiarNumero = (texto) => {
        if (!texto) return 0;
        let limpio = texto.replace(/\./g, "").replace(",", ".").trim();
        let num = parseFloat(limpio);
        return isNaN(num) ? texto.toLowerCase() : num;
      };
      rows.sort((rowA, rowB) => {
        let valA = limpiarNumero(rowA.children[n].innerText);
        let valB = limpiarNumero(rowB.children[n].innerText);
        if (typeof valA === 'number' && typeof valB === 'number') {
          return ordenAsc ? valA - valB : valB - valA;
        }
        return ordenAsc ? valA.toString().localeCompare(valB.toString()) : valB.toString().localeCompare(valA.toString());
      });
      ordenAsc = !ordenAsc;
      rows.forEach(row => tbody.appendChild(row));
    }

    // ===================== PREFILTROS =====================
    // URL de la hoja "Prefiltro" del spreadsheet SERVICES (GID: 1669414303)
    // Usa el mismo spreadsheet publicado que los services. Si los datos no cargan,
    // publicÃ¡ la hoja Prefiltro en: Archivo â Compartir â Publicar en la web â Prefiltro â CSV
    const PREFILTRO_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-BcGUJLdB2MCZXH1VRCOXSZQwktrKeEYO4DrEswu1Dso8nr9291YZWcWB4Sp8POdJM4plo0VEfn8f/pub?output=csv&gid=1669414303";

    async function cargarDatosPrefiltro() {
      try {
        const version = new Date().getTime();
        const response = await fetch(`${PREFILTRO_URL}&v=${version}`);
        const csvText = await response.text();
        if (csvText.includes("<html")) return;

        const filas = csvText.split(/\r?\n/).filter(f => f.trim() !== "");
        const tablaBody = document.getElementById("tabla-body-prefiltro");
        tablaBody.innerHTML = "";

        // La hoja tiene: fila 1 = tÃ­tulo "CAMBIO PREFILTRO", fila 2 = vacÃ­a, fila 3 = headers
        // Salteamos hasta encontrar la fila de headers (PATENTE)
        let headersFound = false;
        filas.forEach(fila => {
          const col = fila.split(/[,;]/).map(c => c.replace(/"/g, "").trim());
          if (!headersFound) {
            if (col[0] && col[0].toUpperCase() === "PATENTE") { headersFound = true; }
            return;
          }
          if (!col[0] || col[0].toLowerCase() === "patente") return;

          const faltaVal = col[2] || "0";
          const faltaNum = parseFloat(faltaVal.replace(/\./g, "").replace(",", "."));
          let clase = "verde";
          if (faltaNum < 0)    clase = "rojo";
          else if (faltaNum < 5000) clase = "amarillo";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="font-weight:bold; color:var(--primary-orange)">${col[0]}</td>
            <td class="km-val">${col[1]}</td>
            <td><span class="status-pill ${clase}">${col[2]}</span></td>
          `;
          tablaBody.appendChild(tr);
        });
      } catch (e) {
        console.error("Error cargando prefiltros:", e);
      }
    }

    function filtrarColumnaPrefiltro(n) {
      let inputs = document.querySelectorAll('#tablaPrefiltro .filter-input');
      let filter = inputs[n].value.toUpperCase();
      let table = document.getElementById("tablaPrefiltro");
      let tr = table.getElementsByTagName("tr");
      for (let i = 2; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[n];
        if (td) {
          let txtValue = td.textContent || td.innerText;
          tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
      }
    }

    let ordenAscPrefiltro = true;
    function ordenarTablaPrefiltro(n) {
      let table = document.getElementById("tablaPrefiltro");
      let tbody = table.querySelector("tbody");
      let rows = Array.from(tbody.querySelectorAll("tr"));
      const limpiarNumero = (texto) => {
        if (!texto) return 0;
        let limpio = texto.replace(/\./g, "").replace(",", ".").trim();
        let num = parseFloat(limpio);
        return isNaN(num) ? texto.toLowerCase() : num;
      };
      rows.sort((rowA, rowB) => {
        let valA = limpiarNumero(rowA.children[n].innerText);
        let valB = limpiarNumero(rowB.children[n].innerText);
        if (typeof valA === 'number' && typeof valB === 'number') {
          return ordenAscPrefiltro ? valA - valB : valB - valA;
        }
        return ordenAscPrefiltro ? valA.toString().localeCompare(valB.toString()) : valB.toString().localeCompare(valA.toString());
      });
      ordenAscPrefiltro = !ordenAscPrefiltro;
      rows.forEach(row => tbody.appendChild(row));
    }

    // Carga inicial y refresco automÃ¡tico cada 5 minutos
    cargarDatos();
    cargarDatosPrefiltro();
    setInterval(cargarDatos, 300000);
    setInterval(cargarDatosPrefiltro, 300000);
  </script>
</body>
</html>
