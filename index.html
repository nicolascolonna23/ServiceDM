<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Servicios | Diemar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0d0f;
            --card-bg: #161a1e;
            --primary-orange: #d35400;
            --text-light: #f4f4f4;
            --border-color: #2a2e33;
            --status-red: #ff4d4d;
            --status-yellow: #ffcc00;
            --status-green: #2ecc71;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-orange);
            padding-bottom: 15px;
        }

        .logo-main {
            max-height: 70px;
            margin-bottom: 10px;
        }

        .refresh-indicator {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 1250px;
            background: var(--card-bg);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            background-image: url('logo_diemar4.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
        }

        .table-wrapper {
            position: relative;
            z-index: 1;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background-color: #000;
            color: #888;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1.5px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: color 0.3s;
            position: sticky;
            top: 0;
        }

        th:hover { color: var(--primary-orange); }

        .filter-row th {
            background-color: #0a0a0a;
            padding: 8px;
            cursor: default;
        }

        .filter-input {
            width: 90%;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 5px;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }

        .filter-input:focus { border-color: var(--primary-orange); }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13.5px;
            text-align: center;
        }

        tr:hover { background-color: rgba(211, 84, 0, 0.05); }

        .status-pill {
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            display: inline-block;
        }

        .rojo { color: var(--status-red); border: 1px solid var(--status-red); background: rgba(255,77,77,0.1); }
        .amarillo { color: var(--status-yellow); border: 1px solid var(--status-yellow); background: rgba(255,204,0,0.1); }
        .verde { color: var(--status-green); border: 1px solid var(--status-green); background: rgba(46,204,113,0.1); }

        .km-val { font-family: 'Courier New', monospace; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo_diemar4.png" alt="Diemar" class="logo-main">
        <h1>Control de Servicios - Flota</h1>
        <div class="refresh-indicator" id="last-update">Sincronizando...</div>
    </div>
