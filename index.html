<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Servicios | Diemar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0d0f;
            --card-bg: #161a1e;
            --primary-orange: #d35400;
            --text-light: #f4f4f4;
            --border-color: #2a2e33;
            --status-red: #ff4d4d;
            --status-yellow: #ffcc00;
            --status-green: #2ecc71;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-orange);
            padding-bottom: 15px;
        }

        .logo-main {
            max-height: 70px;
            margin-bottom: 10px;
        }

        .refresh-indicator {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* CONTENEDOR CON LOGO DIFUMINADO DE FONDO */
        .container {
            width: 100%;
            max-width: 1250px;
            background: var(--card-bg);
            border-radius: 12px;
            position: relative;
            overflow: hidden; /* Para que el logo no se salga de las esquinas redondeadas */
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* El Logo de fondo */
        .container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            background-image: url('logo_diemar4.png'); /* Asegúrate que el nombre sea exacto */
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.04; /* Nivel de difuminado (0.04 = 4% de visibilidad) */
            pointer-events: none; /* Para que no estorbe al hacer clic en la tabla */
            z-index: 0;
        }

        .table-wrapper {
            position: relative;
            z-index: 1; /* Por encima del logo de fondo */
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background-color: #000;
            color: #888;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1.5px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: color 0.3s;
            position: sticky;
            top: 0;
        }

        th:hover { color: var(--primary-orange); }

        /* Fila de filtros */
        .filter-row th {
            background-color: #0a0a0a;
            padding: 8px;
            cursor: default;
        }

        .filter-input {
            width: 90%;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 5px;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }

        .filter-input:focus { border-color: var(--primary-orange); }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13.5px;
            text-align: center;
        }

        tr:hover { background-color: rgba(211, 84, 0, 0.05); }

        .status-pill {
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            display: inline-block;
        }

        .rojo { color: var(--status-red); border: 1px solid var(--status-red); background: rgba(255,77,77,0.1); }
        .amarillo { color: var(--status-yellow); border: 1px solid var(--status-yellow); background: rgba(255,204,0,0.1); }
        .verde { color: var(--status-green); border: 1px solid var(--status-green); background: rgba(46,204,113,0.1); }

        .km-val { font-family: 'Courier New', monospace; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo_diemar4.png" alt="Diemar" class="logo-main">
        <h1>Control de Servicios - Flota</h1>
        <div class="refresh-indicator" id="last-update">Sincronizando...</div>
    </div>

    <div class="container">
        <div class="table-wrapper">
            <table id="miTabla">
                <thead>
                    <tr>
                        <th onclick="ordenarTabla(0)">Patente ↕</th>
                        <th onclick="ordenarTabla(1)">Marca ↕</th>
                        <th onclick="ordenarTabla(2)">Chofer ↕</th>
                        <th onclick="ordenarTabla(4)">Último Service ↕</th>
                        <th onclick="ordenarTabla(5)">KM Último ↕</th>
                        <th onclick="ordenarTabla(6)">Próximo ↕</th>
                        <th onclick="ordenarTabla(7)">KM Actual ↕</th>
                        <th onclick="ordenarTabla(8)">Falta ↕</th>
                    </tr>
                    <tr class="filter-row">
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(0)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(1)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(2)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(3)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(4)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(5)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(6)"></th>
                        <th><input type="text" class="filter-input" placeholder="Filtrar..." onkeyup="filtrarColumna(7)"></th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr><td colspan="8">Cargando flota desde la nube...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-BcGUJLdB2MCZXH1VRCOXSZQwktrKeEYO4DrEswu1Dso8nr9291YZWcWB4Sp8POdJM4plo0VEfn8f/pub?output=csv";

    async function cargarDatos() {
        try {
            const version = new Date().getTime();
            const response = await fetch(`${BASE_URL}&v=${version}`);
            const csvText = await response.text();

            if (csvText.includes("<html")) return;

            const filas = csvText.split(/\r?\n/).filter(f => f.trim() !== "" && f.includes(","));
            const tablaBody = document.getElementById("tabla-body");
            tablaBody.innerHTML = "";

            filas.slice(1).forEach(fila => {
                const col = fila.split(/[,;]/).map(c => c.replace(/"/g, "").trim());
                if(col.length < 8) return;

                const faltaVal = col[8] || "0";
                const faltaNum = parseFloat(faltaVal.replace(/\./g, "").replace(",", "."));

                let clase = "verde";
                if (faltaNum < 5000) clase = "rojo";
                else if (faltaNum < 15000) clase = "amarillo";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight:bold; color:var(--primary-orange)">${col[0]}</td>
                    <td>${col[1]}</td>
                    <td>${col[2]}</td>
                    <td>${col[4]}</td>
                    <td class="km-val">${col[5]}</td>
                    <td>${col[6]}</td>
                    <td class="km-val">${col[7]}</td>
                    <td><span class="status-pill ${clase}">${col[8]}</span></td>
                `;
                tablaBody.appendChild(tr);
            });

            document.getElementById("last-update").innerText = `Última actualización: ${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error(e); }
    }

    // FUNCIÓN PARA FILTRAR
    function filtrarColumna(n) {
        let inputs = document.getElementsByClassName("filter-input");
        let filter = inputs[n].value.toUpperCase();
        let table = document.getElementById("miTabla");
        let tr = table.getElementsByTagName("tr");

        for (let i = 2; i < tr.length; i++) { // Empezamos en 2 por las dos filas de header
            let td = tr[i].getElementsByTagName("td")[n];
            if (td) {
                let txtValue = td.textContent || td.innerText;
                tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    }

    // FUNCIÓN PARA ORDENAR (Asc/Desc)
    let direccion = true;
    function ordenarTabla(n) {
        let table = document.getElementById("miTabla");
        let rows = Array.from(table.querySelectorAll("tbody tr"));
        
        rows.sort((rowA, rowB) => {
            let cellA = rowA.children[n].innerText.replace(/\./g, "").replace(",", ".");
            let cellB = rowB.children[n].innerText.replace(/\./g, "").replace(",", ".");
            
            // Si es número, comparar como número
            if (!isNaN(parseFloat(cellA)) && isFinite(cellA)) {
                return direccion ? cellA - cellB : cellB - cellA;
            }
            // Si es texto
            return direccion ? cellA.localeCompare(cellB) : cellB.localeCompare(cellA);
        });

        direccion = !direccion;
        let tbody = table.querySelector("tbody");
        rows.forEach(row => tbody.appendChild(row));
    }

    cargarDatos();
    setInterval(cargarDatos, 300000);
</script>

</body>
</html>
