<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Servicios | Diemar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121417;
            --card-bg: #1e2126;
            --primary-orange: #d35400;
            --text-light: #f4f4f4;
            --border-color: #333;
            --status-red: #ff4d4d;
            --status-yellow: #ffcc00;
            --status-green: #2ecc71;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-orange);
            padding-bottom: 20px;
        }

        .logo {
            max-width: 300px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
            font-size: 1.5rem;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background-color: #111;
            color: #bbb;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 15px;
            text-align: center;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            text-align: center;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            display: inline-block;
            min-width: 80px;
        }

        .rojo { color: var(--status-red); border: 1px solid var(--status-red); background: rgba(255,77,77,0.1); }
        .amarillo { color: var(--status-yellow); border: 1px solid var(--status-yellow); background: rgba(255,204,0,0.1); }
        .verde { color: var(--status-green); border: 1px solid var(--status-green); background: rgba(46,204,113,0.1); }

        .km-val { font-family: 'Courier New', monospace; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo_diemar4.png" alt="Diemar Logo" class="logo">
        <h1>Control de Servicios - Flota</h1>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Patente</th>
                    <th>Marca</th>
                    <th>Chofer</th>
                    <th>Último Service</th>
                    <th>KM Último</th>
                    <th>Próximo</th>
                    <th>KM Actual</th>
                    <th>Falta</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="8">Cargando datos de flota...</td></tr>
            </tbody>
        </table>
    </div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-BcGUJLdB2MCZXH1VRCOXSZQwktrKeEYO4DrEswu1Dso8nr9291YZWcWB4Sp8POdJM4plo0VEfn8f/pub?output=csv";

    async function cargarDatos() {
        try {
            const response = await fetch(URL);
            const csvText = await response.text();

            // Seguridad: Si Google devuelve HTML en vez de CSV, detener proceso
            if (csvText.includes("<html") || csvText.includes("javascript")) {
                document.getElementById("tabla-body").innerHTML = "<tr><td colspan='8'>Error: El enlace no devuelve datos CSV. Revisa la publicación en Google Sheets.</td></tr>";
                return;
            }

            const filas = csvText.split(/\r?\n/).filter(f => f.trim() !== "");
            const tablaBody = document.getElementById("tabla-body");
            tablaBody.innerHTML = "";

            // Saltamos la cabecera (fila 0)
            filas.slice(1).forEach(fila => {
                // Separamos por coma O punto y coma, y limpiamos comillas
                const col = fila.split(/[,;]/).map(c => c.replace(/"/g, "").trim());

                if(col.length < 8) return;

                // Lógica de colores basada en la columna "Falta" (índice 8)
                const faltaTexto = col[8] || "0";
                const faltaNum = parseFloat(faltaTexto.replace(/\./g, "").replace(",", "."));

                let claseEstado = "verde";
                if (faltaNum < 5000) { // Ajusté a 5k para ser más realista con alertas, cámbialo si prefieres 50k
                    claseEstado = "rojo";
                } else if (faltaNum < 15000) {
                    claseEstado = "amarillo";
                }

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight:bold; color: var(--primary-orange)">${col[0]}</td>
                    <td>${col[1]}</td>
                    <td>${col[2]}</td>
                    <td>${col[4]}</td>
                    <td class="km-val">${col[5]}</td>
                    <td>${col[6]}</td>
                    <td class="km-val">${col[7]}</td>
                    <td><span class="status-pill ${claseEstado}">${col[8]}</span></td>
                `;
                tablaBody.appendChild(tr);
            });

        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById("tabla-body").innerHTML = "<tr><td colspan='8'>Error de conexión al servidor de datos.</td></tr>";
        }
    }

    cargarDatos();
</script>

</body>
</html>
